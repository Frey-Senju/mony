# Alembic Configuration for Mony API
# Story 2.2 — bootstrapped to support schema migrations starting with the
# ARCH-001 cleanup and the open-finance sync schema additions.

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for stamping migrations
timezone = UTC

# Max length of revision identifier in slug
truncate_slug_length = 40

# Set sqlalchemy.url at runtime via env.py from DATABASE_URL.
sqlalchemy.url =

[post_write_hooks]
# (optional) hooks to run after generating new migration files

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
