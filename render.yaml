databases:
  - name: mony-db
    databaseName: mony
    user: mony
    plan: free

services:
  # ── Redis (Key Value) ────────────────────────────────────────────────────────
  - type: redis
    name: mony-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []          # internal access only

  # ── FastAPI (Web Service) ────────────────────────────────────────────────────
  - type: web
    name: mony-api
    runtime: docker
    plan: free
    dockerfile: ./apps/api/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mony-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          name: mony-redis
          type: redis
          property: connectionString
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: OF_SYNC_USE_STUB
        value: "1"           # flip to "0" after Bacen sandbox credentials arrive
      - key: OF_SYNC_LOOKBACK_DAYS
        value: "7"
      - key: OF_FIRST_SYNC_LOOKBACK_DAYS
        value: "90"

  # ── Celery Worker (Background Worker) ───────────────────────────────────────
  - type: worker
    name: mony-celery-worker
    runtime: python
    plan: free
    buildCommand: pip install -r apps/api/requirements.txt
    startCommand: cd apps/api && celery -A workers.celery_app.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mony-db
          property: connectionString
      - key: ENCRYPTION_KEY
        fromService:
          name: mony-api
          type: web
          envVarKey: ENCRYPTION_KEY
      - key: REDIS_URL
        fromService:
          name: mony-redis
          type: redis
          property: connectionString
      - key: WEBHOOK_SECRET
        fromService:
          name: mony-api
          type: web
          envVarKey: WEBHOOK_SECRET
      - key: OF_SYNC_USE_STUB
        value: "1"
      - key: OF_SYNC_LOOKBACK_DAYS
        value: "7"
      - key: OF_FIRST_SYNC_LOOKBACK_DAYS
        value: "90"

  # ── Celery Beat / Scheduler (1 instance only) ────────────────────────────────
  - type: worker
    name: mony-celery-beat
    runtime: python
    plan: free
    buildCommand: pip install -r apps/api/requirements.txt
    startCommand: cd apps/api && celery -A workers.celery_app.celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mony-db
          property: connectionString
      - key: ENCRYPTION_KEY
        fromService:
          name: mony-api
          type: web
          envVarKey: ENCRYPTION_KEY
      - key: REDIS_URL
        fromService:
          name: mony-redis
          type: redis
          property: connectionString
