services:
  - type: web
    name: mony-api
    env: python
    plan: free
    buildCommand: cd apps/api && pip install -r requirements.txt
    startCommand: cd apps/api && python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        scope: service
        value: ${DATABASE_URL}
      - key: JWT_SECRET
        scope: service
        value: ${JWT_SECRET}
      - key: ENVIRONMENT
        value: production

databases:
  - name: mony-db
    engine: postgres
    version: 15
    plan: free
